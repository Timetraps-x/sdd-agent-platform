contract: sdd-workflow-v1
version: 0.1.0
phase: 1.4
name: doctor
command: commands/sdd-doctor.md
lifecycle_gate:
  position: command_entry_or_diagnostic_bypass
  contract: schemas/contracts/lifecycle-decision-contract.md
  execution_phase: "1.7"
  note: "Phase 1.4 declares command entry metadata only; doctor remains read-only."
inputs:
  artifacts:
    - commands/*.md
    - agents/*.md
    - workflows/*.yml
    - templates/*
    - adapters/*
    - schemas/contracts/*
    - schemas/contracts/doctor-static-assets-contract.md
outputs:
  artifacts:
    - doctor_report
phase_gates:
  entry:
    requires:
      - project root or platform asset root
    blocks_on: []
  exit:
    requires:
      - PASS | WARN | FAIL diagnostic summary
      - recovery proposal for FAIL/BLOCKED items
    checkpoint_required: false
forbidden_auto_transitions:
  - auto_fix
  - dependency_install
  - stale_state_delete
  - task_status_success_marking
allowed_agents:
  - scout
doctor_checks:
  required_assets:
    - commands/sdd-spec.md
    - commands/sdd-plan.md
    - commands/sdd-tasks.md
    - commands/sdd-do.md
    - commands/sdd-verify.md
    - commands/sdd-doctor.md
    - agents/scout.md
    - agents/spec-reviewer.md
    - agents/planner.md
    - agents/implementer.md
    - agents/reviewer.md
    - agents/debugger.md
    - agents/validator.md
    - workflows/spec.yml
    - workflows/plan.yml
    - workflows/tasks.yml
    - workflows/do.yml
    - workflows/verify.yml
    - workflows/doctor.yml
    - schemas/contracts/doctor-static-assets-contract.md
