contract: sdd-project-adapter-v1
version: 1.3.0
adapter:
  id: generic
  name: Generic Project Adapter
  owner: platform-assets/adapters
  project_type: generic
  language: generic
  framework: generic

project_defaults:
  spec_dir: specs/<branch>
  docs_language: zh-CN
  compatible_with: spec-kit

key_directories:
  source:
    - src
  tests:
    - test
    - tests
  docs:
    - docs
  sdd:
    - specs
    - .sdd

validation:
  default: []
  smoke: []
  notes:
    - Commands are declarations for future validator/command use and are not executed by the adapter.
    - Generic adapter defaults are intentionally empty/placeholders; project-specific adapters or `.sdd/project.yml` should declare real commands.

editing:
  prefer_hashline: true
  native_edit_fallback: true

runtime:
  background_write: false
  worktree_isolation: false
  sync_back_mode: proposal

lifecycle:
  decision_required: true
  profiles:
    - direct
    - compact
    - full
    - research

risk:
  confirm_required:
    - git_push
    - git_commit
    - git_reset
    - delete_files
    - dependency_install
    - worktree_create
    - worktree_remove
    - ci_cd_change
    - external_publish

extension_points:
  validation_profiles: true
  tool_capabilities: false
  plugin_loader: false
